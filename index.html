<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Seller Assistant Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f4f7);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: var(--tg-theme-button-color, #007aff);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --border-radius: 16px;
            --input-padding: 14px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px; /* Space for fixed button */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 1. Карточная архитектура */
        .card {
            background-color: var(--secondary-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        h2 { margin-top: 0; font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        
        /* 2. Типографика и поля */
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--hint-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input, textarea {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid rgba(0,0,0,0.05);
            padding: var(--input-padding);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--button-color);
        }

        textarea { resize: none; }

        /* 3. Фиксированная кнопка */
        #send_btn_container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--secondary-bg);
            padding: 16px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            z-index: 10;
        }

        button#send_btn {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 18px;
            border-radius: var(--border-radius);
            font-size: 17px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3. Анимации кнопок */
        button#send_btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        button#send_btn:disabled {
            background-color: var(--hint-color);
            cursor: not-allowed;
            transform: none;
        }

        /* 4. Спиннер загрузки */
        #loading_overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255,255,255,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--button-color);
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="card">
        <h2>🛍 Настройка товара</h2>
        
        <div class="form-group">
            <label>Маркетплейс</label>
            <select id="marketplace">
                <option value="Wildberries">Wildberries</option>
                <option value="Ozon">Ozon</option>
                <option value="Яндекс Маркет">Яндекс Маркет</option>
            </select>
        </div>

        <div class="form-group">
            <label>Тональность текста</label>
            <select id="tone">
                <option value="Профессиональный">💼 Профессиональный</option>
                <option value="Дружелюбный">😊 Дружелюбный</option>
                <option value="Эмоциональный">🔥 Продающий (яркий)</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h2>📝 Данные карточки</h2>
        
        <div class="form-group">
            <label>Название товара</label>
            <input type="text" id="p_name" placeholder="Спортивный костюм">
        </div>

        <div class="form-group">
            <label>Ключевые особенности</label>
            <textarea id="p_features" rows="5" placeholder="Ткань футер, оверсайз, не скатывается..."></textarea>
        </div>
    </div>

    <div id="send_btn_container">
        <button id="send_btn">Сгенерировать описание</button>
    </div>

    <div id="loading_overlay">
        <div class="spinner"></div>
        <div id="loading_status" style="font-weight: 600;">ИИ анализирует...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let btn = document.getElementById("send_btn");
        let overlay = document.getElementById("loading_overlay");

        btn.addEventListener("click", () => {
            let market = document.getElementById("marketplace").value;
            let tone = document.getElementById("tone").value;
            let name = document.getElementById("p_name").value;
            let features = document.getElementById("p_features").value;
            
            if (!name || !features) {
                tg.showAlert("Пожалуйста, заполните все поля!");
                return;
            }

            // Показываем загрузку
            overlay.style.display = 'flex';
            btn.innerHTML = '⏳ Генерирую...';
            btn.disabled = true;

            let data = `ПЛОЩАДКА: ${market}\nСТИЛЬ: ${tone}\nТОВАР: ${name}\nДАННЫЕ: ${features}`;
            
            // Отправляем данные боту
            tg.sendData(data);
            
            // Важный UX-момент: мы не закрываем окно *мгновенно*.
            // Мы даем пользователю 0.5 секунды, чтобы он увидел спиннер 
            // и бот в чате успел прислать "Думаю...".
            setTimeout(() => {
                tg.close();
            }, 500);
        });
    </script>
</body>
</html>
