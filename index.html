<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Генератор описаний карточек</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Настройки темы Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'accent': '#b388ff', // Яркий фиолетовый для кнопки
                        'sub-bg': '#f9f9f9',
                        'info-bg': '#e8f0fe',
                    },
                    borderRadius: {
                        'xl': '1rem',
                        '2xl': '1.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        /* Отключаем стандартные стили */
        .option-button:focus { outline: none; }
        
        /* === ИЗМЕНИЛИ ЦВЕТ ТУТ (Синий вместо черного) === */
        .option-button.active {
            background-color: #3b82f6; /* Красивый синий цвет */
            color: white;
            border-color: #3b82f6;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans antialiased overflow-x-hidden p-4">

    <header class="flex items-start gap-3 mb-8">
        <div class="p-3 rounded-2xl bg-white shadow-sm border border-gray-100 flex items-center justify-center">
            <svg class="w-7 h-7 text-gray-900" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Генератор описаний</h1>
            <p class="text-gray-500 text-lg mt-0.5">Дайте продающий текст</p>
        </div>
    </header>

    <main class="space-y-7">

        <section class="space-y-3">
            <h3 class="text-lg font-medium text-gray-700">Выберите маркетплейс</h3>
            <div class="flex gap-2.5 flex-wrap" id="marketplace-group">
                <button class="option-button active px-5 py-3 rounded-xl border border-gray-200 text-base font-medium transition-all duration-150" data-value="Wildberries">Wildberries</button>
                <button class="option-button px-5 py-3 rounded-xl border border-gray-200 text-base font-medium transition-all duration-150" data-value="Ozon">Ozon</button>
                <button class="option-button px-5 py-3 rounded-xl border border-gray-200 text-base font-medium transition-all duration-150" data-value="Яндекс.Маркет">Яндекс.Маркет</button>
            </div>
        </section>

        <section class="space-y-3">
            <h3 class="text-lg font-medium text-gray-700">Тональность текста</h3>
            <div class="flex gap-2.5 flex-wrap" id="tone-group">
                <button class="option-button px-5 py-3 rounded-xl border border-gray-200 text-base font-medium transition-all duration-150" data-value="Профессиональный">Профессиональный</button>
                <button class="option-button px-5 py-3 rounded-xl border border-gray-200 text-base font-medium transition-all duration-150" data-value="Дружелюбный">Дружелюбный</button>
                <button class="option-button active px-5 py-3 rounded-xl border border-gray-200 text-base font-medium transition-all duration-150" data-value="Продающий">Продающий</button>
            </div>
        </section>

        <section class="space-y-3">
            <h3 class="text-lg font-medium text-gray-700">Название товара</h3>
            <input type="text" id="product_name" placeholder="Например: Беспроводные наушники AirPods Pro" class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-0 transition-all text-base outline-none">
        </section>

        <section class="space-y-3">
            <h3 class="text-lg font-medium text-gray-700">Ключевые особенности</h3>
            <textarea id="key_features" rows="4" placeholder="Материал, цвет, размер, функции..." class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-0 transition-all text-base resize-none outline-none"></textarea>
        </section>

        <section class="space-y-3">
            <h3 class="text-lg font-medium text-gray-700">Минусы конкурентов</h3>
            <textarea id="competitor_cons" rows="3" placeholder="Что пишут в негативных отзывах у конкурентов..." class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-0 transition-all text-base resize-none outline-none"></textarea>
        </section>

        <div class="info-bg p-5 rounded-xl border border-blue-100 flex items-start gap-3.5 mt-5">
            <div class="p-2 rounded-lg bg-white border border-blue-100 mt-0.5">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <p class="text-gray-700 text-base leading-relaxed">Не хотите заполнять форму? Просто отправьте фото товара боту в чат — он сам создаст описание!</p>
        </div>

        <div class="pt-6 pb-10">
            <button id="main-button" class="bg-accent w-full py-4 rounded-xl text-white text-lg font-semibold flex items-center justify-center gap-2.5 transition-all duration-150 active:scale-[0.98] shadow-lg shadow-purple-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.364-6.364l.707.707M6.364 18.364l-.707.707M18.364 18.364l.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
                <span>Сгенерировать описание</span>
            </button>
        </div>

    </main>

    <div class="fixed bottom-6 right-4 z-10 pointer-events-none">
        <div class="bg-gray-800 text-white w-10 h-10 rounded-full flex items-center justify-center font-medium shadow-md pointer-events-auto cursor-pointer">?</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        // ИСПРАВЛЕНИЕ: Прячем клавиатуру при клике мимо полей
        document.addEventListener('click', (e) => {
            const isInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';
            const isButton = e.target.closest('button') || e.target.closest('.option-button');
            
            // Если клик не по полю ввода и не по кнопке — убираем фокус
            if (!isInput && !isButton) {
                document.activeElement.blur();
            }
        });

        // Логика выбора кнопок
        function setupButtonGroup(groupId) {
            const group = document.getElementById(groupId);
            const buttons = group.querySelectorAll('.option-button');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    button.classList.add('active');
                });
            });
        }

        setupButtonGroup('marketplace-group');
        setupButtonGroup('tone-group');

        // Отправка данных
        const mainBtn = document.getElementById('main-button');

        mainBtn.addEventListener('click', () => {
            const marketplace = document.querySelector('#marketplace-group .option-button.active').dataset.value;
            const tone = document.querySelector('#tone-group .option-button.active').dataset.value;
            const productName = document.getElementById('product_name').value;
            const keyFeatures = document.getElementById('key_features').value;
            const competitorCons = document.getElementById('competitor_cons').value;

            if (!productName || !keyFeatures) {
                tg.showAlert("⚠️ Пожалуйста, заполните как минимум название товара и его особенности.");
                return;
            }

            const finalRequest = `
Маркетплейс: ${marketplace}
Тональность: ${tone}
Товар: ${productName}
Особенности: ${keyFeatures}
НЕДОСТАТКИ КОНКУРЕНТОВ: ${competitorCons || '[Не указано]'}
`.trim();

            tg.sendData(finalRequest);
        });
    </script>
</body>
</html>
