<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Seller Assistant Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .card {
            background-color: var(--secondary-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--hint-color);
        }

        select, input, textarea {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        button {
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }
        
        h2 { margin-top: 0; font-size: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍 Настройка карточки</h2>
        
        <label>Маркетплейс</label>
        <select id="marketplace">
            <option value="Wildberries">Wildberries</option>
            <option value="Ozon">Ozon</option>
            <option value="Яндекс Маркет">Яндекс Маркет</option>
        </select>

        <label>Тональность текста</label>
        <select id="tone">
            <option value="Профессиональный">💼 Профессиональный</option>
            <option value="Дружелюбный">😊 Дружелюбный</option>
            <option value="Эмоциональный">🔥 Продающий (яркий)</option>
        </select>

        <label>Название товара</label>
        <input type="text" id="p_name" placeholder="Например: Спортивный костюм">

        <label>Ключевые особенности</label>
        <textarea id="p_features" rows="4" placeholder="Ткань футер, не скатывается, оверсайз..."></textarea>
    </div>

    <button id="send_btn">Сгенерировать описание</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let btn = document.getElementById("send_btn");

        btn.addEventListener("click", () => {
            let market = document.getElementById("marketplace").value;
            let tone = document.getElementById("tone").value;
            let name = document.getElementById("p_name").value;
            let features = document.getElementById("p_features").value;
            
            if (!name || !features) {
                tg.showAlert("Пожалуйста, заполните все поля!");
                return;
            }

            // Формируем структурированный запрос для бота
            let data = `ПЛОЩАДКА: ${market}\nСТИЛЬ: ${tone}\nТОВАР: ${name}\nДАННЫЕ: ${features}`;
            
            tg.sendData(data);
            tg.close();
        });
    </script>
</body>
</html>
