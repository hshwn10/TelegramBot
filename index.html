<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Seller Assistant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Генератор описания</h3>
    <input type="text" id="p_name" placeholder="Название товара (например, Кроссовки)">
    <textarea id="p_features" rows="4" placeholder="Краткие характеристики (эко-кожа, белые...)"></textarea>
    <button id="send_btn">Сгенерировать текст</button>

    <script>
        let tg = window.Telegram.WebApp; // Получаем объект Telegram
        tg.expand(); // Разворачиваем на все окно

        let btn = document.getElementById("send_btn");

        btn.addEventListener("click", () => {
            let name = document.getElementById("p_name").value;
            let features = document.getElementById("p_features").value;
            
            // Собираем данные в одну строку
            let data = `Сделай описание товара. Название: ${name}. Характеристики: ${features}`;
            
            // Отправляем данные боту
            tg.sendData(data); 
            tg.close(); // Закрываем приложение
        });
    </script>
</body>
</html>
