<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Seller Assistant Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            --card-bg: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: var(--tg-theme-button-color, #007aff);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            
            --radius-card: 20px;
            --radius-input: 14px;
            --radius-button: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Центрируем для ПК */
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%; /* ЗАПРЕТИТЬ iOS менять размер шрифта */
            touch-action: manipulation; 
        }

        /* Главный контейнер для адаптивности (ПК/Мобайл) */
        #app {
            #app {
            width: 100%;
            max-width: 600px; 
            /* ЗАМЕНИТЬ: */
            min-height: 100dvh; 
            padding: 16px 16px 100px 16px;
            box-sizing: border-box;
            position: relative;
        }
        }

        /* Карточки */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 16px;
        }

        h2 { 
            margin-top: 0; 
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--hint-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Поля ввода и селекты */
        select, input, textarea {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 16px;
            border-radius: var(--radius-input);
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Убиваем страшный системный дизайн у Select */
        /* Усиленный дизайн для Select */
        select {
            display: block; /* Важно для iOS */
            height: 52px; /* Фиксированная высота */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none; /* УБИТЬ СИСТЕМНЫЙ ДИЗАЙН iOS */
            
            /* Новая кастомная белая стрелочка для черной темы */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") !important;
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 16px;
            padding: 16px; /* Отступы для текста внутри */
        }

        select:focus, input:focus, textarea:focus {
            background-color: var(--card-bg);
            border-color: var(--button-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        textarea { resize: vertical; min-height: 80px; }

        /* Блок лайфхака */
        .lifehack {
            background-color: var(--card-bg);
            border-radius: var(--radius-input);
            padding: 16px;
            text-align: center;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px dashed var(--hint-color);
            opacity: 0.8;
        }

        .lifehack span {
            font-size: 13px;
            color: var(--text-color);
            line-height: 1.4;
            display: block;
        }

        /* Фиксированная кнопка */
        /* ЛИПКАЯ КНОПКА (Sticky) вместо фиксированной */
        #send_btn_container {
            position: -webkit-sticky;
            position: sticky; /* Липкий режим */
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 600px;
            
            /* Отступы, чтобы кнопка не прилипала вплотную к краю */
            padding: 16px 16px 30px 16px; 
            box-sizing: border-box;
            z-index: 10;
            
            /* Эффект матового стекла под кнопкой */
            background-color: color-mix(in srgb, var(--bg-color) 85%, transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-top: 10px;
        }
        
        button#send_btn {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 18px;
            border-radius: var(--radius-button);
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button#send_btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
        
        button#send_btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Оверлей загрузки */
        #loading_overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: color-mix(in srgb, var(--bg-color) 80%, transparent);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        .spinner {
            border: 4px solid var(--hint-color);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: var(--button-color);
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="card">
            <h2>🛍 Настройка товара</h2>
            
            <div class="form-group">
                <label>Маркетплейс</label>
                <select id="marketplace">
                    <option value="Wildberries">Wildberries</option>
                    <option value="Ozon">Ozon</option>
                    <option value="Яндекс Маркет">Яндекс Маркет</option>
                </select>
            </div>

            <div class="form-group">
                <label>Тональность текста</label>
                <select id="tone">
                    <option value="Профессиональный">💼 Профессиональный</option>
                    <option value="Дружелюбный">😊 Дружелюбный</option>
                    <option value="Эмоциональный">🔥 Продающий (яркий)</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>📝 Данные карточки</h2>
            
            <div class="form-group">
                <label>Название товара</label>
                <input type="text" id="p_name" placeholder="Например: Спортивный костюм">
            </div>

            <div class="form-group">
                <label>🤬 Минусы конкурентов (Отзывы)</label>
                <textarea id="p_flaws" placeholder="Что пишут в плохих отзывах у других? (Например: тонкая ткань, линяет, маломерит...)"></textarea>
            </div>

            <div class="form-group">
                <label>Ключевые особенности</label>
                <textarea id="p_features" placeholder="Ткань футер, оверсайз, не скатывается, производство РФ..."></textarea>
            </div>
        </div>

        <div class="lifehack">
            <span>💡 <b>Лайфхак:</b> можно не заполнять форму, а просто отправить боту в чат <b>фото товара</b>.</span>
        </div>
    </div>

    <div id="send_btn_container">
        <button id="send_btn">Сгенерировать описание</button>
    </div>

    <div id="loading_overlay">
        <div class="spinner"></div>
        <div id="loading_status" style="font-weight: 600; font-family: 'Inter', sans-serif;">ИИ анализирует...</div>
    </div>

    <script>
